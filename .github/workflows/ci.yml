name: CI Build

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential pkg-config libgtest-dev cppcheck gcovr lcov

    - name: Set up Google Test
      run: |
        # Find gtest library path
        GTEST_PATH=$(dpkg -L libgtest-dev | grep -E "lib.*gtest\.a$" | head -1 | xargs dirname)
        echo "GTEST_PATH=$GTEST_PATH" >> $GITHUB_ENV
        ls -la $GTEST_PATH

    - name: Build with make
      run: |
        export CXXFLAGS="-I/usr/include/gtest"
        export LDFLAGS="-L/usr/lib/x86_64-linux-gnu"
        make

    - name: Run unit tests
      run: make test

    - name: Static code analysis with cppcheck
      run: |
        cppcheck --enable=all --suppress=missingIncludeSystem --error-exitcode=1 main.c main.h

    - name: Build check with strict warnings
      run: |
        gcc -Wall -Wextra -Werror -c main.c -o /tmp/main_check.o

    - name: Run coverage measurement
      run: make coverage
      continue-on-error: true

    - name: Generate HTML coverage report
      run: make coverage-html
      continue-on-error: true

    - name: Check coverage directory
      run: ls -la out/ || echo "out directory does not exist"
      continue-on-error: true

    - name: Upload coverage reports
      uses: actions/upload-artifact@v4
      if: always() && hashFiles('out/coverage/**') != ''
      with:
        name: coverage-report
        path: out/coverage/
        if-no-files-found: warn

    - name: Clean up
      if: always()
      run: make clean




