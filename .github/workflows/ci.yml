name: CI Build

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential pkg-config libgtest-dev cppcheck gcovr lcov

    - name: Set up Google Test
      run: |
        # Find gtest library path
        GTEST_PATH=$(dpkg -L libgtest-dev | grep -E "lib.*gtest\.a$" | head -1 | xargs dirname)
        echo "GTEST_PATH=$GTEST_PATH" >> $GITHUB_ENV
        ls -la $GTEST_PATH

    - name: Build with make
      run: |
        export CXXFLAGS="-I/usr/include/gtest"
        export LDFLAGS="-L/usr/lib/x86_64-linux-gnu"
        make

    - name: Run unit tests
      id: test
      run: |
        make test
        echo "✅ Unit tests passed"
        echo "test_status=passed" >> $GITHUB_OUTPUT

    - name: Static code analysis with cppcheck
      id: cppcheck
      run: |
        cppcheck --enable=all --suppress=missingIncludeSystem --error-exitcode=1 main.c main.h
        echo "✅ Static analysis passed"
        echo "cppcheck_status=passed" >> $GITHUB_OUTPUT

    - name: Build check with strict warnings
      id: build_check
      run: |
        gcc -Wall -Wextra -Werror -c main.c -o /tmp/main_check.o
        echo "✅ Build check with warnings passed"
        echo "build_check_status=passed" >> $GITHUB_OUTPUT

    - name: Run coverage measurement
      id: coverage
      run: |
        make coverage
        echo "✅ Coverage measurement completed"
        echo "coverage_status=completed" >> $GITHUB_OUTPUT
      continue-on-error: true

    - name: Generate HTML coverage report
      id: coverage_html
      run: |
        make coverage-html
        echo "✅ HTML coverage report generated"
        echo "coverage_html_status=generated" >> $GITHUB_OUTPUT
      continue-on-error: true

    - name: Check coverage directory
      run: ls -la out/ || echo "out directory does not exist"
      continue-on-error: true

    - name: Upload coverage reports
      uses: actions/upload-artifact@v4
      if: always() && hashFiles('out/coverage/**') != ''
      with:
        name: coverage-report
        path: out/coverage/
        if-no-files-found: warn

    - name: Final status check
      if: always()
      run: |
        if [[ "${{ steps.test.outcome }}" == "success" && "${{ steps.cppcheck.outcome }}" == "success" && "${{ steps.build_check.outcome }}" == "success" ]]; then
          echo "🎉 All CI checks passed successfully!"
          echo "✅ Build: OK"
          echo "✅ Tests: OK"
          echo "✅ Static Analysis: OK"
          echo "✅ Warnings Check: OK"
          echo "✅ Coverage: Generated (check artifacts)"
          exit 0
        else
          echo "❌ Some CI checks failed!"
          echo "Build: ${{ steps.test.outcome == 'success' && '✅ OK' || '❌ FAILED' }}"
          echo "Tests: ${{ steps.cppcheck.outcome == 'success' && '✅ OK' || '❌ FAILED' }}"
          echo "Static Analysis: ${{ steps.build_check.outcome == 'success' && '✅ OK' || '❌ FAILED' }}"
          echo "Warnings Check: ${{ steps.coverage.outcome == 'success' && '✅ OK' || '⚠️  SKIPPED' }}"
          echo "Coverage: ${{ steps.coverage_html.outcome == 'success' && '✅ OK' || '⚠️  SKIPPED' }}"
          exit 1
        fi

    - name: Clean up
      if: always()
      run: make clean




